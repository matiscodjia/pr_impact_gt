# ============================================================================
# experiment_config.yaml — Configuration centralisée des expériences
# ============================================================================

# ── Dataset source ──
dataset:
  id: 100
  name: "Dataset100_PARSE"
  raw_dir: "./data"
  splits:
    train: 0.70
    val: 0.15
    test: 0.15
  seed: 42

# ── nnU-Net training ──
training:
  configurations: ["3d_fullres"]
  folds: [0, 1, 2, 3, 4]
  # Schedule court fixe (validé par la courbe de convergence, cf. plot_convergence.py).
  # ~4x plus rapide que le défaut nnU-Net (1000) ; lu par nnUNetTrainerDegraded et
  # appliqué à nnUNetTrainer250 (Model_Star / Model_Minus_Fixed).
  num_epochs: 250

# ── Matrice expérimentale (consommée par orchestrator.py) ──
# Un modèle = (trainer nnU-Net, dataset source). tier = priorité d'exécution
# (A traité avant B avant C). L'orchestrateur entrelace les folds au sein d'un tier
# pour obtenir un résultat comparatif complet au plus tôt, puis l'affiner.
experiment:
  models:
    - name: Model_Star
      trainer: nnUNetTrainer250
      dataset_id: 100
      tier: A
    - name: Model_Minus_Stoch
      trainer: nnUNetTrainerDegraded
      dataset_id: 100
      tier: A
    - name: Model_Minus_Fixed
      trainer: nnUNetTrainer250
      dataset_id: 101
      tier: A
    # Tier C — spécificité de la robustesse (outcome 7), activé en phase P3.
    - name: Model_Minus_MorphoOnly
      trainer: nnUNetTrainerDegradedMorphoOnly
      dataset_id: 100
      tier: C
    - name: Model_Minus_OmissionOnly
      trainer: nnUNetTrainerDegradedOmissionOnly
      dataset_id: 100
      tier: C

# ── Datasets dégradés fixes ──
# Chaque clé est l'ID nnU-Net cible (Dataset10X_PARSE_Fixed).
# Les dégradations sont appliquées séquentiellement dans l'ordre de la liste.
# Ajouter un type suffit à l'empiler — aucun autre fichier à modifier.
fixed_datasets:
  101:
    name: "Dataset101_PARSE_MorphoOmission"
    degradations:
      - type: morpho
        prob: 0.3
        max_radius: 3
      - type: omission
        prob: 0.2
        radius: 2
  102:
    name: "Dataset102_PARSE_MorphoOmission_102"
    degradations:
      - type: morpho
        prob: 1
        max_radius: 3
      - type: omission
        prob: 1
        radius: 2

# ── Dégradations stochastiques on-the-fly (nnUNetTrainerDegraded) ──
# Même format que fixed_datasets[*].degradations — les types sont identiques.
stochastic_degradations:
  - type: morpho
    prob: 0.3
    max_radius: 3
  - type: omission
    prob: 0.2
    radius: 2

# ── Calibration du schedule (choix de num_epochs) ──
# Un run long UNIQUE sur 1 fold, avec snapshots de checkpoints aux jalons.
# Chaque snapshot est évalué en out-of-fold sur clDice + Betti0 (TOPOLOGIE, qui
# converge plus tard que le Dice de région) → courbe + recommandation.
# cf. scripts/calibrate.py et orchestrator.py --calibrate.
calibration:
  budget: 1000                                  # epochs du run de calibration (généreux)
  milestones: [200, 300, 400, 500, 600, 800, 1000]
  trainer: nnUNetTrainerCalib                   # ...Degraded pour calibrer Minus_Stoch
  dataset_id: 100
  fold: 0
  plateau_tol: 0.01                             # plateau = clDice ≥ (1-tol)·max

# ── Grid search ──
grid_search:
  morpho_grid:
    prob: [0.1, 0.2, 0.3, 0.5]
    max_radius: [1, 2, 3, 5]
  omission_grid:
    prob: [0.1, 0.2, 0.3, 0.5]
    radius: [1, 2, 3]
  top_n_combos: 3
  # Comparaison relative (un seul fold) → schedule plus court que les modèles principaux.
  num_epochs: 150
  fold: 0

# ── Évaluation ──
evaluation:
  metrics: ["CLDice", "HD95", "NSD", "Betti0"]
  scenarios:
    - name: "GT_star"
      description: "Évaluation sur GT propres"
      degradation: null
    - name: "GT_minus_test"
      description: "Évaluation sur GT de test dégradées systématiquement (prob=1.0)"
      degradation:
        - type: morpho
          prob: 1.0
          max_radius: 3
        - type: omission
          prob: 1.0
          radius: 2

# ── Hardware profiles ──
hardware:
  macos_mps:
    vram_gb: 24
    num_workers: 2
    device: "mps"
  a40:
    vram_gb: 35
    num_workers: 4
    device: "cuda"
