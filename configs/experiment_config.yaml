# ============================================================================
# experiment_config.yaml — Configuration centralisée des expériences
# ============================================================================

# ── Dataset source ──
dataset:
  id: 100
  name: "Dataset100_PARSE"
  raw_dir: "./data"
  splits:
    train: 0.70
    val: 0.15
    test: 0.15
  seed: 42

# ── nnU-Net training ──
training:
  configurations: ["3d_fullres"]
  folds: [0, 1, 2, 3, 4]

# ── Datasets dégradés fixes ──
# Chaque clé est l'ID nnU-Net cible (Dataset10X_PARSE_Fixed).
# Les dégradations sont appliquées séquentiellement dans l'ordre de la liste.
# Ajouter un type suffit à l'empiler — aucun autre fichier à modifier.
fixed_datasets:
  101:
    name: "Dataset101_PARSE_MorphoOmission"
    degradations:
      - type: morpho
        prob: 0.3
        max_radius: 3
      - type: omission
        prob: 0.2
        min_size: 150
  102:
    name: "Dataset102_PARSE_MorphoOmission_102"
    degradations:
      - type: morpho
        prob: 1
        max_radius: 3
      - type: omission
        prob: 1
        min_size: 150

# ── Dégradations stochastiques on-the-fly (nnUNetTrainerDegraded) ──
# Même format que fixed_datasets[*].degradations — les types sont identiques.
stochastic_degradations:
  - type: morpho
    prob: 0.3
    max_radius: 3
  - type: omission
    prob: 0.2
    min_size: 150

# ── Grid search ──
grid_search:
  morpho_grid:
    prob: [0.1, 0.2, 0.3, 0.5]
    max_radius: [1, 2, 3, 5]
  omission_grid:
    prob: [0.1, 0.2, 0.3, 0.5]
    min_size: [50, 100, 200, 500]
  top_n_combos: 3
  num_epochs: 250
  fold: 0

# ── Évaluation ──
evaluation:
  metrics: ["CLDice", "HD95", "NSD", "Betti0"]
  scenarios:
    - name: "GT_star"
      description: "Évaluation sur GT propres"
      degradation: null
    - name: "GT_minus_test_full"
      description: "Évaluation sur GT de test dégradées systématiquement (prob=1.0)"
      degradation:
        - type: morpho
          prob: 1.0
          max_radius: 3
        - type: omission
          prob: 1.0
          min_size: 150

# ── Hardware profiles ──
hardware:
  macos_mps:
    vram_gb: 24
    num_workers: 2
    device: "mps"
  a40:
    vram_gb: 35
    num_workers: 4
    device: "cuda"
